name: Release

on:
  push:
    tags: ["[0-9]*.[0-9]*.[0-9]*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Verify tagged commit belongs to main
        run: git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main
      - name: Verify version
        run: test "$GITHUB_REF_NAME" = "$(node -p "require('./manifest.json').version")"
      - run: npm run build
      - name: Validate release files
        run: |
          test -s dist/main.js
          test -s dist/manifest.json
          test -s dist/styles.css
          test "$(node -p "require('./versions.json')[require('./manifest.json').version]")" = "$(node -p "require('./manifest.json').minAppVersion")"
      - name: Attest main.js
        uses: actions/attest@v4
        with:
          subject-path: dist/main.js
      - name: Attest styles.css
        uses: actions/attest@v4
        with:
          subject-path: dist/styles.css
      - name: Create GitHub release
        run: >-
          gh release create "$GITHUB_REF_NAME"
          dist/main.js
          dist/manifest.json
          dist/styles.css
          --title "GEDCOM for Obsidian $GITHUB_REF_NAME"
          --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
